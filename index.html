<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Milestone Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-track{background:#f0f0f0}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
body{background:#fff;color:#333;font-family:'JetBrains Mono',monospace;min-height:100vh}

#loadScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,#f8f8fb 0%,#eeeef5 50%,#f8f8fb 100%);padding:24px;text-align:center}
.logo-main{font-family:'Oswald',sans-serif;font-size:40px;font-weight:700;letter-spacing:5px;text-transform:uppercase;line-height:1.1;background:linear-gradient(135deg,#e04400 0%,#d4930d 50%,#e04400 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0% center}50%{background-position:200% center}}
.subtitle{font-size:12px;color:#999;letter-spacing:3px;text-transform:uppercase;margin:8px 0 40px;font-family:'Oswald',sans-serif}
#progressText{font-size:11px;color:#999;margin-top:8px}

#app{display:none;padding:20px 16px;max-width:900px;margin:0 auto}
.header{text-align:center;margin-bottom:24px}
.logo-sm{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(90deg,#e04400,#d4930d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.db-info{font-size:10px;color:#999;letter-spacing:2px;margin-top:2px}

/* DATE PICKER */
.date-area{text-align:center;margin-bottom:28px}
.date-input{padding:10px 16px;border-radius:6px;background:#f5f5f8;color:#222;font-size:15px;font-family:'JetBrains Mono',monospace;outline:none;border:2px solid #ddd;transition:border-color 0.2s;cursor:pointer}
.date-input:focus{border-color:#e04400}
.date-nav{display:flex;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.date-nav-btn{padding:6px 14px;border-radius:14px;border:1px solid #ddd;background:#fff;color:#666;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s}
.date-nav-btn:hover{border-color:#e04400;color:#e04400}

/* FILTERS */
.filter-row{display:flex;justify-content:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#888;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s}
.filter-btn:hover{border-color:#7c3aed;color:#7c3aed}
.filter-btn.active{background:#7c3aed;border-color:#7c3aed;color:#fff}

/* SUMMARY BANNER */
.day-banner{text-align:center;margin-bottom:24px;padding:16px 20px;background:linear-gradient(135deg,#1a1a2e 0%,#2d2d5e 100%);border-radius:8px}
.day-banner .day-date{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase}
.day-banner .day-count{font-size:11px;color:#ccc;margin-top:4px;letter-spacing:1px}

/* MILESTONE CARDS */
.ms-list{display:flex;flex-direction:column;gap:10px}
.ms-card{padding:14px 18px;border-radius:8px;border:1px solid #e8e8ee;background:#fafafa;transition:all 0.15s;display:flex;align-items:flex-start;gap:14px}
.ms-card:hover{border-color:#ddd;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.ms-card.type-cumulative{border-left:4px solid #e04400}
.ms-card.type-streak{border-left:4px solid #7c3aed}
.ms-card.type-quirky{border-left:4px solid #059669}
.ms-card.type-single_game{border-left:4px solid #d4930d}
.ms-card.type-season{border-left:4px solid #2563eb}

.ms-emoji{font-size:24px;flex-shrink:0;margin-top:2px}
.ms-body{flex:1;min-width:0}
.ms-headline{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:#222;letter-spacing:0.5px;text-transform:uppercase;line-height:1.3}
.ms-headline .ms-val{color:#e04400}
.ms-detail{font-size:11px;color:#888;margin-top:4px;line-height:1.5}
.ms-detail .ms-player{color:#222;font-weight:600}
.ms-detail .ms-matchup{color:#666}
.ms-detail .ms-line{color:#999;font-style:italic}
.ms-tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-top:6px}
.ms-tag.tag-cumulative{background:#fef0eb;color:#e04400}
.ms-tag.tag-streak{background:#f0ebfe;color:#7c3aed}
.ms-tag.tag-quirky{background:#ecfdf5;color:#059669}
.ms-tag.tag-single_game{background:#fef9eb;color:#d4930d}
.ms-tag.tag-season{background:#eff6ff;color:#2563eb}

/* EMPTY */
.empty-state{text-align:center;padding:80px 20px;color:#ccc;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:2px}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:0.5}

/* ALL DATES VIEW */
.all-dates{margin-top:20px}
.date-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #f0f0f3;cursor:pointer;transition:background 0.1s}
.date-row:hover{background:#f5f5ff}
.date-row .dr-date{font-weight:600;color:#222;font-size:12px}
.date-row .dr-count{font-size:11px;color:#999}
.date-row .dr-preview{font-size:10px;color:#888;flex:1;margin:0 16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.date-row .dr-badges{display:flex;gap:4px}
.dr-badge{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dr-badge.b-cum{background:#e04400}
.dr-badge.b-str{background:#7c3aed}
.dr-badge.b-qrk{background:#059669}
.dr-badge.b-sg{background:#d4930d}

@media(max-width:600px){
  .logo-main{font-size:28px;letter-spacing:3px}
  .ms-card{flex-direction:column;gap:8px}
  .ms-headline{font-size:14px}
}
</style>
</head>
<body>
<div id="loadScreen">
  <div class="logo-main">MILESTONE<br>TRACKER</div>
  <div class="subtitle">Daily Milestone Alerts · 1947-Present</div>
  <div id="progressText">Loading...</div>
</div>
<div id="app">
  <div class="header">
    <div class="logo-sm">MILESTONE TRACKER</div>
    <div class="db-info" id="dbInfo"></div>
  </div>
  <div class="date-area">
    <input type="date" class="date-input" id="dateInput">
    <div class="date-nav">
      <button class="date-nav-btn" onclick="shiftDate(-1)">← Day Before</button>
      <button class="date-nav-btn" onclick="setYesterday()">Yesterday</button>
      <button class="date-nav-btn" onclick="setToday()">Today</button>
      <button class="date-nav-btn" onclick="shiftDate(1)">Day After →</button>
      <button class="date-nav-btn" onclick="showAllDates()">📋 All Dates</button>
    </div>
  </div>
  <div class="filter-row" id="filters">
    <button class="filter-btn active" data-type="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" data-type="cumulative" onclick="setFilter('cumulative',this)">🎯 Cumulative</button>
    <button class="filter-btn" data-type="streak" onclick="setFilter('streak',this)">🔥 Streaks</button>
    <button class="filter-btn" data-type="quirky" onclick="setFilter('quirky',this)">🤪 Quirky</button>
    <button class="filter-btn" data-type="single_game" onclick="setFilter('single_game',this)">⭐ Single Game</button>
    <button class="filter-btn" data-type="season" onclick="setFilter('season',this)">📈 Season</button>
  </div>
  <div id="content"></div>
</div>
<script>
let DATA={};
let allDates=[];
let currentFilter="all";
let currentView="day"; // "day" or "all"

const EMOJIS={cumulative:"🎯",streak:"🔥",quirky:"🤪",single_game:"⭐",season:"📈"};
const TYPE_LABELS={cumulative:"Cumulative",streak:"Streak",quirky:"Quirky",single_game:"Single Game",season:"Season"};

(async function(){
  const text=document.getElementById("progressText");
  try{
    text.textContent="Loading historical milestones...";
    // Load gzipped historical milestones
    const histResp=await fetch("milestones_historical.bin");
    if(!histResp.ok)throw new Error("Historical: HTTP "+histResp.status);
    const histReader=histResp.body.getReader();
    const histChunks=[];let histSize=0;
    while(true){const{done,value}=await histReader.read();if(done)break;histChunks.push(value);histSize+=value.length}
    const histCompressed=new Uint8Array(histSize);let hOff=0;
    for(const c of histChunks){histCompressed.set(c,hOff);hOff+=c.length}
    const histData=JSON.parse(pako.inflate(histCompressed,{to:'string'}));

    text.textContent="Loading current season...";
    // Load current season milestones (plain JSON)
    const curResp=await fetch("milestones.json");
    let curData={};
    if(curResp.ok)curData=await curResp.json();

    // Merge
    DATA={...histData,...curData};
    allDates=Object.keys(DATA).sort().reverse();
    text.textContent="Done!";
    setTimeout(()=>{
      document.getElementById("loadScreen").style.display="none";
      document.getElementById("app").style.display="block";
      const totalMs=Object.values(DATA).reduce((s,d)=>s+d.length,0);
      document.getElementById("dbInfo").textContent=allDates.length+" GAME DATES · "+totalMs.toLocaleString()+" MILESTONES · 1947-2026";
      if(allDates.length)setDateValue(allDates[0]);
      renderDay();
    },200);
  }catch(err){text.textContent="Error: "+err.message;console.error(err)}
})();

const dateInput=document.getElementById("dateInput");
dateInput.addEventListener("change",()=>{currentView="day";renderDay()});

function setDateValue(iso){dateInput.value=iso}
function setToday(){setDateValue(new Date().toISOString().slice(0,10));currentView="day";renderDay()}
function setYesterday(){const d=new Date();d.setDate(d.getDate()-1);setDateValue(d.toISOString().slice(0,10));currentView="day";renderDay()}
function shiftDate(delta){
  if(!dateInput.value)return;
  // Find next/prev date that has milestones
  const cur=dateInput.value;
  const idx=allDates.indexOf(cur);
  if(delta<0){
    // Go to next newer date with milestones
    const newer=idx>0?allDates[idx-1]:null;
    if(newer){setDateValue(newer);currentView="day";renderDay()}
    else{
      const d=new Date(cur+"T12:00:00");d.setDate(d.getDate()+delta);
      setDateValue(d.toISOString().slice(0,10));currentView="day";renderDay();
    }
  }else{
    // Go to next older date with milestones
    const older=idx>=0&&idx<allDates.length-1?allDates[idx+1]:(idx<0?allDates.find(d=>d<cur):null);
    if(older){setDateValue(older);currentView="day";renderDay()}
    else{
      const d=new Date(cur+"T12:00:00");d.setDate(d.getDate()+delta);
      setDateValue(d.toISOString().slice(0,10));currentView="day";renderDay();
    }
  }
}

function setFilter(type,btn){
  currentFilter=type;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(currentView==="day")renderDay();
  else renderAllDates();
}

function showAllDates(){window._selYear=window._selYear||allDates[0]?.slice(0,4);currentView="all";renderAllDates()}

function renderDay(){
  currentView="day";
  const val=dateInput.value;
  const ms=DATA[val]||[];
  const filtered=currentFilter==="all"?ms:ms.filter(m=>m.type===currentFilter);
  const container=document.getElementById("content");
  document.getElementById("filters").style.display="flex";

  if(!val){container.innerHTML='<div class="empty-state"><div class="icon">📅</div>Pick a date</div>';return}

  const fmtDate=new Date(val+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

  if(!filtered.length){
    const hasAny=ms.length>0;
    container.innerHTML='<div class="day-banner"><div class="day-date">'+fmtDate+'</div><div class="day-count">'
      +(hasAny?ms.length+' milestones (none matching filter)':'No milestones on this date')+'</div></div>'
      +'<div class="empty-state"><div class="icon">'+(hasAny?'🔍':'📅')+'</div>'
      +(hasAny?'No milestones match the current filter':'No milestones were detected on this date')+'</div>';
    return;
  }

  let html='<div class="day-banner"><div class="day-date">'+fmtDate+'</div><div class="day-count">'
    +filtered.length+(filtered.length!==ms.length?' of '+ms.length:'')+' milestone'+(filtered.length!==1?'s':'')+'</div></div>';

  html+='<div class="ms-list">';
  filtered.forEach(m=>{
    const emoji=EMOJIS[m.type]||"•";
    const typeLabel=TYPE_LABELS[m.type]||m.type;
    html+='<div class="ms-card type-'+m.type+'">'
      +'<div class="ms-emoji">'+emoji+'</div>'
      +'<div class="ms-body">'
      +'<div class="ms-headline">'+m.milestone+'</div>'
      +'<div class="ms-detail">'
      +'<span class="ms-player">'+m.player+'</span> '
      +'<span class="ms-matchup">('+m.team+' vs '+m.opp+')</span> — '
      +'<span class="ms-line">'+m.line+'</span>'
      +'</div>'
      +'<span class="ms-tag tag-'+m.type+'">'+typeLabel+'</span>'
      +'</div></div>';
  });
  html+='</div>';
  container.innerHTML=html;
}

function renderAllDates(){
  currentView="all";
  document.getElementById("filters").style.display="flex";
  const container=document.getElementById("content");

  // Get available years
  const years=[...new Set(allDates.map(d=>d.slice(0,4)))].sort().reverse();
  const selYear=window._selYear||years[0];
  window._selYear=selYear;

  // Filter dates by selected year and type
  const yearDates=allDates.filter(d=>d.startsWith(selYear));
  let filteredDates=yearDates;
  if(currentFilter!=="all"){
    filteredDates=yearDates.filter(d=>DATA[d].some(m=>m.type===currentFilter));
  }

  let html='<div class="day-banner"><div class="day-date">ALL GAME DATES</div><div class="day-count">'
    +allDates.length+' dates with milestones · '+Object.values(DATA).reduce((s,d)=>s+d.length,0).toLocaleString()+' total</div></div>';

  // Year pills
  html+='<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:16px">';
  years.forEach(y=>{
    const active=y===selYear?"background:#e04400;color:#fff;border-color:#e04400":"";
    html+='<button onclick="window._selYear=\''+y+'\';renderAllDates()" style="padding:4px 10px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#888;font-size:10px;font-weight:600;font-family:JetBrains Mono,monospace;cursor:pointer;'+active+'">'+y+'</button>';
  });
  html+='</div>';

  html+='<div style="font-size:10px;color:#999;text-align:center;margin-bottom:12px">'+filteredDates.length+' dates in '+selYear+'</div>';

  html+='<div class="all-dates">';
  filteredDates.forEach(d=>{
    const ms=DATA[d];
    const filtered=currentFilter==="all"?ms:ms.filter(m=>m.type===currentFilter);
    if(!filtered.length)return;
    const fmtDate=new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    const types=new Set(filtered.map(m=>m.type));
    let badges="";
    if(types.has("cumulative"))badges+='<div class="dr-badge b-cum"></div>';
    if(types.has("streak"))badges+='<div class="dr-badge b-str"></div>';
    if(types.has("quirky"))badges+='<div class="dr-badge b-qrk"></div>';
    if(types.has("single_game"))badges+='<div class="dr-badge b-sg"></div>';
    const topMs=filtered[0];
    const preview=topMs?topMs.player+": "+topMs.milestone:"";
    html+='<div class="date-row" onclick="setDateValue(\''+d+'\');currentView=\'day\';renderDay()">'
      +'<div class="dr-date">'+fmtDate+'</div>'
      +'<div class="dr-preview">'+preview+'</div>'
      +'<div class="dr-badges">'+badges+'</div>'
      +'<div class="dr-count">'+filtered.length+'</div>'
      +'</div>';
  });
  html+='</div>';
  container.innerHTML=html;
}
</script>
</body>
</html>
