<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Milestone Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-track{background:#f0f0f0}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
body{background:#fff;color:#333;font-family:'JetBrains Mono',monospace;min-height:100vh}
#loadScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,#f8f8fb 0%,#eeeef5 50%,#f8f8fb 100%);padding:24px;text-align:center}
.logo-main{font-family:'Oswald',sans-serif;font-size:40px;font-weight:700;letter-spacing:5px;text-transform:uppercase;line-height:1.1;background:linear-gradient(135deg,#e04400 0%,#d4930d 50%,#e04400 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0% center}50%{background-position:200% center}}
.subtitle{font-size:12px;color:#999;letter-spacing:3px;text-transform:uppercase;margin:8px 0 40px;font-family:'Oswald',sans-serif}
#progressText{font-size:11px;color:#999;margin-top:8px}
#app{display:none;padding:20px 16px;max-width:960px;margin:0 auto}
.header{text-align:center;margin-bottom:16px}
.logo-sm{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(90deg,#e04400,#d4930d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.db-info{font-size:10px;color:#999;letter-spacing:2px;margin-top:2px}
.main-tabs{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:20px}
.main-tab{padding:8px 16px;border-radius:6px;border:2px solid #ddd;cursor:pointer;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.15s;background:transparent;color:#999}
.main-tab:hover{border-color:#bbb;color:#666}
.main-tab.active{background:#e04400;border-color:#e04400;color:#fff}
.section{display:none}.section.active{display:block}
.date-area{text-align:center;margin-bottom:20px}
.date-input{padding:10px 16px;border-radius:6px;background:#f5f5f8;color:#222;font-size:15px;font-family:'JetBrains Mono',monospace;outline:none;border:2px solid #ddd;transition:border-color 0.2s;cursor:pointer}
.date-input:focus{border-color:#e04400}
.date-nav{display:flex;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.nbtn{padding:6px 14px;border-radius:14px;border:1px solid #ddd;background:#fff;color:#666;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s}
.nbtn:hover{border-color:#e04400;color:#e04400}
.filter-row{display:flex;justify-content:center;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{padding:5px 10px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#888;font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s}
.fbtn:hover{border-color:#7c3aed;color:#7c3aed}
.fbtn.active{background:#7c3aed;border-color:#7c3aed;color:#fff}
.banner{text-align:center;margin-bottom:20px;padding:14px 20px;background:linear-gradient(135deg,#1a1a2e 0%,#2d2d5e 100%);border-radius:8px}
.banner .bdate{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase}
.banner .bcount{font-size:11px;color:#ccc;margin-top:4px;letter-spacing:1px}
.ms-list{display:flex;flex-direction:column;gap:10px}
.msc{padding:14px 18px;border-radius:8px;border:1px solid #e8e8ee;background:#fafafa;display:flex;align-items:flex-start;gap:14px;transition:all 0.15s}
.msc:hover{box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.msc.type-cumulative{border-left:4px solid #e04400}.msc.type-streak{border-left:4px solid #7c3aed}.msc.type-quirky{border-left:4px solid #059669}.msc.type-single_game{border-left:4px solid #d4930d}.msc.type-season{border-left:4px solid #2563eb}.msc.type-team{border-left:4px solid #0891b2}
.msc .emo{font-size:24px;flex-shrink:0;margin-top:2px}
.msc .bod{flex:1;min-width:0}
.msc .hl{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:#222;letter-spacing:0.5px;text-transform:uppercase;line-height:1.3}
.msc .det{font-size:11px;color:#888;margin-top:4px;line-height:1.5}
.msc .det b{color:#222;font-weight:600}
.msc .tg{display:inline-block;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-top:6px}
.tg.tag-cumulative{background:#fef0eb;color:#e04400}.tg.tag-streak{background:#f0ebfe;color:#7c3aed}.tg.tag-quirky{background:#ecfdf5;color:#059669}.tg.tag-single_game{background:#fef9eb;color:#d4930d}.tg.tag-season{background:#eff6ff;color:#2563eb}.tg.tag-team{background:#ecfeff;color:#0891b2}
.all-dates{margin-top:12px}
.dr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #f0f0f3;cursor:pointer;transition:background 0.1s}
.dr:hover{background:#f5f5ff}
.dr .drd{font-weight:600;color:#222;font-size:12px;min-width:80px}
.dr .drc{font-size:11px;color:#999;min-width:20px;text-align:right}
.dr .drp{font-size:10px;color:#888;flex:1;margin:0 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dr .drb{display:flex;gap:3px;margin-right:8px}
.bdg{width:8px;height:8px;border-radius:50%}.bdg.b1{background:#e04400}.bdg.b2{background:#7c3aed}.bdg.b3{background:#d4930d}.bdg.b4{background:#0891b2}
.sinp{width:100%;padding:12px 16px;border-radius:6px;background:#f5f5f8;color:#222;font-size:14px;font-family:'JetBrains Mono',monospace;outline:none;border:2px solid #ddd}
.sinp:focus{border-color:#e04400}
/* QB */
.qb{max-width:750px;margin:0 auto 20px;padding:16px 20px;background:#f8f8fb;border-radius:10px;border:1px solid #e8e8ee}
.qr{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;margin-bottom:10px}
.ql{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;color:#999;letter-spacing:1px;text-transform:uppercase}
.qs{padding:7px 10px;border-radius:6px;border:2px solid #ddd;background:#fff;color:#222;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;outline:none}
.qs:focus{border-color:#e04400}
.qi{padding:7px 10px;border-radius:6px;border:2px solid #ddd;background:#fff;color:#222;font-size:11px;font-family:'JetBrains Mono',monospace;width:70px;outline:none;text-align:center}
.qi:focus{border-color:#e04400}
.qgo{padding:8px 24px;border-radius:6px;border:none;background:#e04400;color:#fff;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer}
.qgo:hover{filter:brightness(1.1)}
.qcnt{font-size:10px;color:#999;text-align:center;margin-bottom:10px;letter-spacing:1px}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #e0e0e6}
table.lb{width:100%;border-collapse:collapse;font-size:11px;background:#fff}
table.lb th{padding:10px 12px;text-align:left;color:#888;font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;border-bottom:2px solid #e0e0e6;background:#f2f2f5;position:sticky;top:0;z-index:2}
table.lb th.r{text-align:right}table.lb th.c{text-align:center}
table.lb td{padding:8px 12px;color:#444;border-bottom:1px solid #f0f0f3}
table.lb td.r{text-align:right}table.lb td.c{text-align:center}
table.lb td.rk{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;text-align:center;width:40px}
table.lb td.rk.t1{color:#d4930d}table.lb td.rk.t3{color:#e04400}
table.lb td.nm{font-weight:600;color:#222;white-space:nowrap}
table.lb td.vl{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:#e04400;text-align:right}
table.lb td.mt{color:#999;font-size:10px}
table.lb td.tt{color:#7c3aed;font-weight:600;font-size:10px}
table.lb td.bi{color:#059669;font-size:10px}
table.lb tr:nth-child(even){background:#f8f8fb}
table.lb tbody tr:hover{background:#f0f0ff}
.empty{text-align:center;padding:60px 20px;color:#ccc;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:2px}
.empty .icon{font-size:48px;margin-bottom:16px;opacity:0.5}
@media(max-width:600px){.logo-main{font-size:28px}.main-tab{padding:6px 10px;font-size:10px}.msc{flex-direction:column;gap:8px}.msc .hl{font-size:14px}table.lb td.vl{font-size:13px}.qr{gap:6px}}
</style>
</head>
<body>
<div id="loadScreen">
  <div class="logo-main">MILESTONE<br>TRACKER</div>
  <div class="subtitle">Records · Milestones · 1947-Present</div>
  <div id="progressText">Loading...</div>
</div>
<div id="app">
  <div class="header">
    <div class="logo-sm">NBA MILESTONE TRACKER</div>
    <div class="db-info" id="dbInfo"></div>
  </div>
  <div class="main-tabs">
    <button class="main-tab active" onclick="showView('daily')">📅 Daily</button>
    <button class="main-tab" onclick="showView('alldates')">📋 All Dates</button>
    <button class="main-tab" onclick="showView('search')">🔍 Search</button>
    <button class="main-tab" onclick="showView('query')">📊 Query Builder</button>
  </div>
  <div class="section active" id="sec-daily">
    <div class="date-area"><input type="date" class="date-input" id="dateInput">
      <div class="date-nav">
        <button class="nbtn" onclick="shiftDate(-1)">← Day Before</button>
        <button class="nbtn" onclick="setYesterday()">Yesterday</button>
        <button class="nbtn" onclick="setToday()">Today</button>
        <button class="nbtn" onclick="shiftDate(1)">Day After →</button>
      </div>
    </div>
    <div class="filter-row" id="fD"></div><div id="dC"></div>
  </div>
  <div class="section" id="sec-alldates"><div class="filter-row" id="fA"></div><div id="aC"></div></div>
  <div class="section" id="sec-search">
    <div style="max-width:500px;margin:0 auto 20px"><input class="sinp" id="sI" type="text" placeholder="Search player, team, or milestone..." autocomplete="off"></div>
    <div class="filter-row" id="fS"></div><div id="sC"></div>
  </div>
  <div class="section" id="sec-query">
    <div class="qb">
      <div class="qr">
        <span class="ql">Show</span>
        <select class="qs" id="qE" onchange="qOpts()"><option value="players">Players</option><option value="tp">Players (with team)</option><option value="ts">Team Seasons</option></select>
      </div>
      <div class="qr">
        <span class="ql">Stat</span>
        <select class="qs" id="qS"></select>
        <span class="ql">Mode</span>
        <select class="qs" id="qM" onchange="qModeChange()"></select>
      </div>
      <div class="qr" id="qStreakRow" style="display:none"><span class="ql">At least</span><select class="qs" id="qST"></select><span class="ql">per game</span></div>
      <div class="qr" id="qBioRow" style="display:none">
        <span class="ql">Filter by</span>
        <select class="qs" id="qBioType" onchange="qBioTypeChange()">
          <option value="">No filter</option>
          <option value="country">Country</option>
          <option value="state">State (US-born)</option>
          <option value="college">College</option>
          <option value="pos">Position</option>
        </select>
        <select class="qs" id="qBioVal" style="display:none;max-width:200px"></select>
      </div>
      <div class="qr">
        <span class="ql">Show</span>
        <select class="qs" id="qC"><option value="top">Top</option><option value="min">At Least</option></select>
        <input class="qi" id="qV" type="number" value="50">
        <button class="qgo" onclick="qRun()">GO</button> <button class="qgo" style="background:#7c3aed;font-size:11px;padding:8px 14px" onclick="shareQuery()">🔗 SHARE</button>
      </div>
    </div>
    <div class="qcnt" id="qCnt"></div>
    <div class="tbl-wrap"><table class="lb"><thead id="qH"></thead><tbody id="qB"></tbody></table></div>
  </div>
</div>
<script>
let MS={},QD={},allDates=[],flat=[],cF="all";
const EM={cumulative:"🎯",streak:"🔥",quirky:"🤪",single_game:"⭐",season:"📈",team:"🏀"};
const TL={cumulative:"Cumulative",streak:"Streak",quirky:"Quirky",single_game:"Single Game",season:"Season",team:"Team"};
const FT=["all","cumulative","streak","team","single_game","season","quirky"];
// Player indices
let SKEYS=[],SCONF={},GH_START=65;
const APP_VERSION="2026.03.15d";
const P={NM:0,GP:1,PT:2,RB:3,AS:4,ST:5,BK:6,TP:7,FM:8,FA:9,FTM:10,FTA:11,TOV:12,PF:13,FY:14,LY:15,
  CI:16,COI:17,POS:18,HT:19,DY:20,PK:21,SI:22,
};

(async function(){
  const t=document.getElementById("progressText");
  try{
    t.textContent="Loading milestones...";
    const h=await fetch("milestones_historical.bin?v="+APP_VERSION);if(!h.ok)throw new Error("Hist:"+h.status);
    const rd=h.body.getReader();const ch=[];let sz=0;
    while(true){const{done,value}=await rd.read();if(done)break;ch.push(value);sz+=value.length}
    const cp=new Uint8Array(sz);let o=0;for(const c of ch){cp.set(c,o);o+=c.length}
    const hist=JSON.parse(pako.inflate(cp,{to:'string'}));
    t.textContent="Loading season...";
    const cr=await fetch("milestones.json?v="+APP_VERSION);let cur={};if(cr.ok)cur=await cr.json();
    MS={...hist,...cur};allDates=Object.keys(MS).sort().reverse();
    t.textContent="Loading query data...";
    const qr=await fetch("query_data.bin?v="+APP_VERSION);
    if(qr.ok){const rd2=qr.body.getReader();const c2=[];let s2=0;
      while(true){const{done,value}=await rd2.read();if(done)break;c2.push(value);s2+=value.length}
      const cp2=new Uint8Array(s2);let o2=0;for(const c of c2){cp2.set(c,o2);o2+=c.length}
      QD=JSON.parse(pako.inflate(cp2,{to:'string'}))}
    SKEYS=QD.streak_keys||[];SCONF=QD.streak_config||{};GH_START=(QD.p&&QD.p[0])?QD.p[0].length-6:65;
    buildFlat();t.textContent="Done!";
    setTimeout(()=>{
      document.getElementById("loadScreen").style.display="none";
      document.getElementById("app").style.display="block";
      const tm=Object.values(MS).reduce((s,d)=>s+d.length,0);
      document.getElementById("dbInfo").textContent="v"+APP_VERSION+" · "+allDates.length+" DATES · "+tm.toLocaleString()+" MILESTONES · "+(QD.p||[]).length+" PLAYERS · 1947-2026";
      if(allDates.length)document.getElementById("dateInput").value=allDates[0];
      bF("fD");bF("fA");bF("fS");qOpts();if(!loadFromURL())rD();
    },200);
  }catch(e){t.textContent="Error: "+e.message;console.error(e)}
})();
function buildFlat(){flat=[];for(const d in MS)for(const m of MS[d])flat.push({...m,date:d})}
function showView(v){
  document.querySelectorAll(".main-tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".main-tab").forEach(t=>{const m={daily:"📅",alldates:"📋",search:"🔍",query:"📊"};if(t.textContent.includes(m[v]))t.classList.add("active")});
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("sec-"+v).classList.add("active");
  if(v==="daily")rD();if(v==="alldates")rA();if(v==="search"){document.getElementById("sI").focus();rS()}
}
function bF(id){const el=document.getElementById(id);el.innerHTML=FT.map(t=>{const l=t==="all"?"All":(EM[t]||"")+" "+(TL[t]||t);return'<button class="fbtn'+(t===cF?" active":"")+'" onclick="sF(\''+t+'\')">'+l+'</button>'}).join("")}
function sF(t){cF=t;bF("fD");bF("fA");bF("fS");rD();rA();rS()}
const dI=document.getElementById("dateInput");dI.addEventListener("change",rD);
function setToday(){dI.value=new Date().toISOString().slice(0,10);rD()}
function setYesterday(){const d=new Date();d.setDate(d.getDate()-1);dI.value=d.toISOString().slice(0,10);rD()}
function shiftDate(delta){if(!dI.value)return;const c=dI.value;const i=allDates.indexOf(c);if(delta>0){const n=i>0?allDates[i-1]:(i<0?allDates.find(d=>d>c):null);if(n)dI.value=n;else{const d=new Date(c+"T12:00:00");d.setDate(d.getDate()+1);dI.value=d.toISOString().slice(0,10)}}else{const o=i>=0&&i<allDates.length-1?allDates[i+1]:(i<0?allDates.find(d=>d<c):null);if(o)dI.value=o;else{const d=new Date(c+"T12:00:00");d.setDate(d.getDate()-1);dI.value=d.toISOString().slice(0,10)}}rD()}

function card(m,ed){
  const e=EM[m.type]||"•";const tl=TL[m.type]||m.type;
  let dt=ed?' · <span style="color:#e04400;font-weight:600">'+new Date(ed+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+'</span>':"";
  return'<div class="msc type-'+m.type+'"'+(ed?' style="cursor:pointer" onclick="dI.value=\''+ed+'\';showView(\'daily\')"':'')+'><div class="emo">'+e+'</div><div class="bod"><div class="hl">'+m.milestone+'</div><div class="det"><b>'+m.player+'</b> ('+m.team+' vs '+m.opp+') — <i style="color:#999">'+m.line+'</i>'+dt+'</div><span class="tg tag-'+m.type+'">'+tl+'</span></div></div>';
}

function rD(){
  const v=dI.value;const ms=MS[v]||[];const f=cF==="all"?ms:ms.filter(m=>m.type===cF);const el=document.getElementById("dC");
  if(!v){el.innerHTML='<div class="empty"><div class="icon">📅</div>Pick a date</div>';return}
  const fd=new Date(v+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  if(!f.length){el.innerHTML='<div class="banner"><div class="bdate">'+fd+'</div><div class="bcount">'+(ms.length?ms.length+' milestones (none matching filter)':'No milestones on this date')+'</div></div>';return}
  let h='<div class="banner"><div class="bdate">'+fd+'</div><div class="bcount">'+f.length+(f.length!==ms.length?' of '+ms.length:'')+' milestone'+(f.length!==1?'s':'')+'</div></div><div class="ms-list">';
  f.forEach(m=>{h+=card(m)});el.innerHTML=h+'</div>';
}

function rA(){
  const el=document.getElementById("aC");const yrs=[...new Set(allDates.map(d=>d.slice(0,4)))].sort().reverse();
  const sy=window._sy||yrs[0];window._sy=sy;
  const yd=allDates.filter(d=>d.startsWith(sy));const fd=cF==="all"?yd:yd.filter(d=>MS[d].some(m=>m.type===cF));
  let h='<div class="banner"><div class="bdate">ALL GAME DATES</div><div class="bcount">'+allDates.length+' dates · '+Object.values(MS).reduce((s,d)=>s+d.length,0).toLocaleString()+' milestones</div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:12px">';
  yrs.forEach(y=>{const a=y===sy?"background:#e04400;color:#fff;border-color:#e04400":"";h+='<button onclick="window._sy=\''+y+'\';rA()" style="padding:4px 8px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#888;font-size:9px;font-weight:600;font-family:JetBrains Mono,monospace;cursor:pointer;'+a+'">'+y+'</button>'});
  h+='</div><div style="font-size:10px;color:#999;text-align:center;margin-bottom:8px">'+fd.length+' dates in '+sy+'</div><div class="all-dates">';
  fd.forEach(d=>{const ms=MS[d];const fl=cF==="all"?ms:ms.filter(m=>m.type===cF);if(!fl.length)return;
    const fn=new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    const ts=new Set(fl.map(m=>m.type));let b="";
    if(ts.has("cumulative"))b+='<div class="bdg b1"></div>';if(ts.has("streak"))b+='<div class="bdg b2"></div>';if(ts.has("team"))b+='<div class="bdg b4"></div>';if(ts.has("single_game"))b+='<div class="bdg b3"></div>';
    h+='<div class="dr" onclick="dI.value=\''+d+'\';showView(\'daily\')"><div class="drd">'+fn+'</div><div class="drp">'+(fl[0]?fl[0].player+": "+fl[0].milestone:"")+'</div><div class="drb">'+b+'</div><div class="drc">'+fl.length+'</div></div>'});
  el.innerHTML=h+'</div>';
}

const sInp=document.getElementById("sI");let sT;
sInp.addEventListener("input",()=>{clearTimeout(sT);sT=setTimeout(rS,200)});
function rS(){
  const q=sInp.value.toLowerCase().trim();const el=document.getElementById("sC");
  if(!q){el.innerHTML='<div class="empty"><div class="icon">🔍</div>Type a player, team, or milestone keyword</div>';return}
  let r=flat.filter(m=>{if(cF!=="all"&&m.type!==cF)return false;return(m.player+" "+m.milestone+" "+m.team+" "+m.opp+" "+(m.cat||"")).toLowerCase().includes(q)});
  r.sort((a,b)=>b.date.localeCompare(a.date));const t=r.length;const s=r.slice(0,50);
  let h='<div class="banner"><div class="bdate">SEARCH: "'+q.toUpperCase()+'"</div><div class="bcount">'+t.toLocaleString()+' result'+(t!==1?'s':'')+(t>50?' · showing 50':'')+'</div></div>';
  if(!s.length){el.innerHTML=h+'<div class="empty"><div class="icon">🔍</div>No results</div>';return}
  h+='<div class="ms-list">';s.forEach(m=>{h+=card(m,m.date)});el.innerHTML=h+'</div>'+(t>50?'<div style="text-align:center;padding:16px;color:#999;font-size:10px">Showing 50 of '+t.toLocaleString()+'</div>':'');
}

// === QUERY BUILDER ===
const PSTATS=[{id:"pts",l:"Points",i:P.PT},{id:"reb",l:"Rebounds",i:P.RB},{id:"ast",l:"Assists",i:P.AS},{id:"stl",l:"Steals",i:P.ST},{id:"blk",l:"Blocks",i:P.BK},{id:"tpm",l:"3-Pointers",i:P.TP},{id:"gp",l:"Games Played",i:P.GP},{id:"fgm",l:"FG Made",i:P.FM},{id:"fga",l:"FG Attempted",i:P.FA},{id:"ftm",l:"FT Made",i:P.FTM},{id:"fta",l:"FT Attempted",i:P.FTA},{id:"tov",l:"Turnovers",i:P.TOV},{id:"pf",l:"Personal Fouls",i:P.PF}];
const GHSTATS=[{id:"hpts",l:"Career High PTS",o:0},{id:"hreb",l:"Career High REB",o:1},{id:"hast",l:"Career High AST",o:2},{id:"hstl",l:"Career High STL",o:3},{id:"hblk",l:"Career High BLK",o:4},{id:"htpm",l:"Career High 3PM",o:5}];
const TPSTATS=[{id:"pts",l:"Points",i:3},{id:"reb",l:"Rebounds",i:4},{id:"ast",l:"Assists",i:5},{id:"tpm",l:"3-Pointers",i:6},{id:"gp",l:"Games",i:2}];
const TSSTATS=[{id:"pts",l:"Points",i:3},{id:"tpm",l:"3-Pointers",i:4},{id:"reb",l:"Rebounds",i:5},{id:"ast",l:"Assists",i:6},{id:"gp",l:"Games",i:2}];

function qOpts(){
  const e=document.getElementById("qE").value;
  const s=document.getElementById("qS");
  const m=document.getElementById("qM");
  const bioRow=document.getElementById("qBioRow");
  if(e==="players"){
    s.innerHTML=[...PSTATS,...GHSTATS].map(x=>'<option value="'+x.id+'">'+x.l+'</option>').join("");
    m.innerHTML='<option value="total">Career Total</option><option value="pergame">Per Game</option><option value="streak">Streak</option>';
    bioRow.style.display="flex";
  }else if(e==="tp"){
    s.innerHTML=TPSTATS.map(x=>'<option value="'+x.id+'">'+x.l+'</option>').join("");
    m.innerHTML='<option value="total">Total with Team</option>';
    bioRow.style.display="none";
  }else{
    s.innerHTML=TSSTATS.map(x=>'<option value="'+x.id+'">'+x.l+'</option>').join("");
    m.innerHTML='<option value="total">Season Total</option><option value="pergame">Per Game</option>';
    bioRow.style.display="none";
  }
  qModeChange();
}
function qModeChange(){
  const mode=document.getElementById("qM").value;
  const sr=document.getElementById("qSR")||document.getElementById("qStreakRow");
  if(sr)sr.style.display=mode==="streak"?"flex":"none";
  const s=document.getElementById("qS");
  if(mode==="streak"){
    s.innerHTML=Object.entries(SCONF).map(([k,v])=>'<option value="'+k+'">'+v.label+'</option>').join("");
    s.onchange=qStreakStatChange;
    qStreakStatChange();
  }else{
    s.onchange=null;
    if(document.getElementById("qE").value==="players"){
      const gh=[{id:"hpts",l:"Career High PTS"},{id:"hreb",l:"Career High REB"},{id:"hast",l:"Career High AST"},{id:"hstl",l:"Career High STL"},{id:"hblk",l:"Career High BLK"},{id:"htpm",l:"Career High 3PM"}];
      s.innerHTML=[...PSTATS,...gh].map(x=>'<option value="'+x.id+'">'+x.l+'</option>').join("");
    }
  }
}
function qStreakStatChange(){
  const stat=document.getElementById("qS").value;
  const stEl=document.getElementById("qST");
  const conf=SCONF[stat];
  if(conf&&conf.thresholds){
    stEl.innerHTML=conf.thresholds.map(t=>'<option value="'+t+'">'+t+'</option>').join("");
    if(conf.thresholds.length>2)stEl.selectedIndex=Math.floor(conf.thresholds.length/2);
  }
}
function qBioTypeChange(){
  const bt=document.getElementById("qBioType").value;
  const bv=document.getElementById("qBioVal");
  if(!bt){bv.style.display="none";return}
  bv.style.display="inline-block";
  if(bt==="country"){
    bv.innerHTML='<option value="">All</option>'+(QD.countries||[]).map(c=>'<option value="'+c+'">'+c+'</option>').join("");
  }else if(bt==="state"){
    bv.innerHTML='<option value="">All</option>'+(QD.states||[]).map(s=>'<option value="'+s+'">'+s+'</option>').join("");
  }else if(bt==="college"){
    bv.innerHTML='<option value="">All</option>'+(QD.colleges||[]).map(c=>'<option value="'+c+'">'+c+'</option>').join("");
  }else if(bt==="pos"){
    bv.innerHTML='<option value="">All</option><option value="G">G (Guard)</option><option value="F">F (Forward)</option><option value="C">C (Center)</option><option value="PG">PG</option><option value="SG">SG</option><option value="SF">SF</option><option value="PF">PF</option>';
  }
}

function fmt(n){return typeof n==="number"?(Number.isInteger(n)?n.toLocaleString():n.toFixed(1)):n}

function getStreakIdx(stat,threshold){
  let key;
  if(stat==="dd")key="dd";
  else if(stat==="td")key="td";
  else{
    const prefix={pts:"p",reb:"r",ast:"a",stl:"s",blk:"b",tpm:"t"}[stat];
    if(!prefix)return -1;
    key=prefix+threshold;
  }
  const idx=SKEYS.indexOf(key);
  if(idx<0)return -1;
  return GH_START-SKEYS.length+idx;
}

function bioFilter(p){
  const bt=document.getElementById("qBioType").value;
  const bv=document.getElementById("qBioVal").value;
  if(!bt||!bv)return true;
  if(bt==="country"){
    const ci=p[P.CI];
    return ci>=0&&(QD.countries||[])[ci]===bv;
  }
  if(bt==="state"){
    const ps=QD.player_states||{};
    const si=ps[p[P.NM]];
    if(si===undefined||si<0)return false;
    return(QD.states||[])[si]===bv;
  }
  if(bt==="college"){
    const ci=p[P.COI];
    return ci>=0&&(QD.colleges||[])[ci]===bv;
  }
  if(bt==="pos"){
    const pos=p[P.POS]||"";
    return pos.includes(bv);
  }
  return true;
}

function qRun(){
  const entity=document.getElementById("qE").value;
  const stat=document.getElementById("qS").value;
  const mode=document.getElementById("qM").value;
  const cond=document.getElementById("qC").value;
  const val=parseInt(document.getElementById("qV").value)||50;
  const h=document.getElementById("qH"),b=document.getElementById("qB");
  let results=[];

  if(entity==="players"){
    const players=(QD.p||[]).filter(bioFilter);
    if(mode==="streak"){
      const threshold=parseInt(document.getElementById("qST").value)||30;
      const idx=getStreakIdx(stat,threshold);
      if(idx!==null){
        results=players.map(p=>({name:p[P.NM],value:p[idx],gp:p[P.GP],
          bio:getBio(p),years:p[P.FY]+"-"+p[P.LY]})).filter(r=>r.value>0);
      }else{
        // Threshold not pre-computed, show message
        document.getElementById("qCnt").textContent="Streak threshold "+threshold+" not available for "+stat+". Available: PTS(10,15,20,25,30,35,40) REB(5,10,15,20) AST(5,10,15,20)";
        b.innerHTML="";h.innerHTML="";return;
      }
    }else if(mode==="pergame"){
      const ps=[...PSTATS,...GHSTATS].find(s=>s.id===stat);if(!ps){return}
      const gi=ps.i!==undefined?ps.i:GH_START+ps.o;
      results=players.filter(p=>p[P.GP]>=50).map(p=>({name:p[P.NM],
        value:Math.round(p[gi]/p[P.GP]*100)/100,gp:p[P.GP],
        bio:getBio(p),years:p[P.FY]+"-"+p[P.LY]}));
    }else{
      const ps=[...PSTATS,...GHSTATS].find(s=>s.id===stat);if(!ps){return}
      const gi=ps.i!==undefined?ps.i:GH_START+ps.o;
      results=players.map(p=>({name:p[P.NM],value:p[gi],gp:p[P.GP],
        bio:getBio(p),years:p[P.FY]+"-"+p[P.LY]}));
    }
    results.sort((a,b2)=>b2.value-a.value);
    if(cond==="min")results=results.filter(r=>r.value>=val);else results=results.slice(0,val);
    document.getElementById("qCnt").textContent=results.length.toLocaleString()+" results";
    const isStreak=mode==="streak";const isPG=mode==="pergame";
    h.innerHTML='<tr><th class="c">#</th><th>Player</th><th class="r">'+(isStreak?"Streak":isPG?"Per Game":"Total")+'</th><th class="r">Games</th><th>Bio</th><th>Years</th></tr>';
    b.innerHTML=results.map((r,i)=>'<tr><td class="rk'+(i===0?" t1":i<3?" t3":"")+'">'+(i+1)+'</td><td class="nm">'+r.name+'</td><td class="vl">'+fmt(r.value)+(isStreak?" gm":"")+'</td><td class="r mt">'+fmt(r.gp)+'</td><td class="bi">'+r.bio+'</td><td class="mt">'+r.years+'</td></tr>').join("");
  }else if(entity==="tp"){
    const ts=TPSTATS.find(s=>s.id===stat);if(!ts)return;
    results=(QD.tp||[]).map(r=>({name:r[0],team:r[1],value:r[ts.i],gp:r[2]}));
    results.sort((a,b2)=>b2.value-a.value);
    if(cond==="min")results=results.filter(r=>r.value>=val);else results=results.slice(0,val);
    document.getElementById("qCnt").textContent=results.length.toLocaleString()+" results";
    h.innerHTML='<tr><th class="c">#</th><th>Player</th><th>Team</th><th class="r">Value</th><th class="r">Games</th></tr>';
    b.innerHTML=results.map((r,i)=>'<tr><td class="rk'+(i===0?" t1":i<3?" t3":"")+'">'+(i+1)+'</td><td class="nm">'+r.name+'</td><td class="tt">'+r.team+'</td><td class="vl">'+fmt(r.value)+'</td><td class="r mt">'+fmt(r.gp)+'</td></tr>').join("");
  }else{
    const ts=TSSTATS.find(s=>s.id===stat);if(!ts)return;
    if(mode==="pergame"){
      results=(QD.ts||[]).filter(r=>r[2]>=20).map(r=>({team:r[0],season:(r[1]-1)+"-"+String(r[1]).slice(2),value:Math.round(r[ts.i]/r[2]*100)/100,gp:r[2]}));
    }else{
      results=(QD.ts||[]).map(r=>({team:r[0],season:(r[1]-1)+"-"+String(r[1]).slice(2),value:r[ts.i],gp:r[2]}));
    }
    results.sort((a,b2)=>b2.value-a.value);
    if(cond==="min")results=results.filter(r=>r.value>=val);else results=results.slice(0,val);
    document.getElementById("qCnt").textContent=results.length.toLocaleString()+" results";
    h.innerHTML='<tr><th class="c">#</th><th>Team</th><th>Season</th><th class="r">Value</th><th class="r">Games</th></tr>';
    b.innerHTML=results.map((r,i)=>'<tr><td class="rk'+(i===0?" t1":i<3?" t3":"")+'">'+(i+1)+'</td><td class="nm">'+r.team+'</td><td class="tt">'+r.season+'</td><td class="vl">'+fmt(r.value)+'</td><td class="r mt">'+r.gp+'</td></tr>').join("");
  }
}

function getBio(p){
  const country=(QD.countries||[])[p[P.CI]]||"";
  const college=(QD.colleges||[])[p[P.COI]]||"";
  const pos=p[P.POS]||"";
  const ps=QD.player_states||{};
  const si=ps[p[P.NM]];
  const state=si!==undefined&&si>=0?(QD.states||[])[si]||"":"";
  const parts=[];
  if(pos)parts.push(pos);
  if(country&&country!=="United States")parts.push(country);
  else if(state)parts.push(state);
  if(college)parts.push(college);
  return parts.join(" · ");
}

// === URL SHARING ===
function shareQuery(){
  const params={
    e:document.getElementById("qE").value,
    s:document.getElementById("qS").value,
    m:document.getElementById("qM").value,
    c:document.getElementById("qC").value,
    v:document.getElementById("qV").value,
  };
  const st=document.getElementById("qST");
  if(st&&st.offsetParent!==null)params.st=st.value;
  const bt=document.getElementById("qBioType").value;
  if(bt){params.bt=bt;params.bv=document.getElementById("qBioVal").value}
  const hash=Object.entries(params).map(([k,v])=>k+"="+encodeURIComponent(v)).join("&");
  const url=window.location.origin+window.location.pathname+"#q="+hash;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=event.target;btn.textContent="✓ COPIED";
    setTimeout(()=>{btn.textContent="🔗 SHARE"},1500);
  }).catch(()=>{prompt("Copy this URL:",url)});
}

function loadFromURL(){
  const h=window.location.hash;
  if(!h||!h.startsWith("#q="))return false;
  const pairs=h.slice(3).split("&");
  const p={};pairs.forEach(s=>{const[k,v]=s.split("=");p[k]=decodeURIComponent(v)});
  // Switch to query view
  sv("query");
  // Set entity
  if(p.e){document.getElementById("qE").value=p.e;qOpts()}
  // Wait for options to build, then set values
  setTimeout(()=>{
    if(p.m){document.getElementById("qM").value=p.m;qModeChange()}
    setTimeout(()=>{
      if(p.s)document.getElementById("qS").value=p.s;
      if(p.st){const stEl=document.getElementById("qST");if(stEl){qStreakStatChange();stEl.value=p.st}}
      if(p.bt){
        document.getElementById("qBioType").value=p.bt;qBioTypeChange();
        if(p.bv)document.getElementById("qBioVal").value=p.bv;
      }
      if(p.c)document.getElementById("qC").value=p.c;
      if(p.v)document.getElementById("qV").value=p.v;
      qRun();
    },100);
  },100);
  return true;
}
